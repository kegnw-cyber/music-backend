<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Music Player</title>
  <style>
    :root { --bg: #121212; --surface: #1e1e1e; --primary: #bb86fc; --text: #fff; --text-secondary: #b0b0b0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    .tabs { display: flex; background: var(--surface); border-bottom: 1px solid #333; }
    .tab { padding: 16px 32px; cursor: pointer; color: var(--text-secondary); border-bottom: 3px solid transparent; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab:hover { background: #2a2a2a; }
    .tab-content { flex: 1; overflow-y: auto; padding: 20px; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .search-bar { width: 100%; padding: 12px 20px; border-radius: 50px; border: 1px solid #333; background: var(--surface); color: var(--text); font-size: 16px; margin-bottom: 20px; }
    .search-bar:focus { outline: none; border-color: var(--primary); }
    .track-item { display: flex; align-items: center; padding: 12px; background: var(--surface); border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; }
    .track-item:hover { background: #2a2a2a; }
    .track-cover { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
    .track-info { flex: 1; margin-left: 16px; }
    .track-title { font-weight: 500; }
    .track-artist { color: var(--text-secondary); font-size: 14px; }
    .track-actions button { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 20px; padding: 4px 8px; }
    .track-actions button:hover { color: var(--primary); }
    .track-actions button.liked { color: #ff4080; }
    .player { background: var(--surface); border-top: 1px solid #333; padding: 16px; display: none; }
    .player.active { display: block; }
    .player-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .player-controls { display: flex; align-items: center; gap: 16px; }
    .player-controls button { background: none; border: none; color: var(--text); cursor: pointer; font-size: 24px; }
    .player-controls button:hover { color: var(--primary); }
    .player-controls button.active { color: var(--primary); }
    audio { width: 100%; }
    .sub-tabs { display: flex; gap: 16px; margin-bottom: 20px; }
    .sub-tab { padding: 8px 16px; cursor: pointer; color: var(--text-secondary); border-radius: 20px; }
    .sub-tab.active { background: var(--primary); color: #000; }
    .station-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #333; background: var(--surface); color: var(--text); cursor: pointer; margin-right: 8px; }
    .station-btn:hover { background: var(--primary); color: #000; }
  </style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" data-tab="main">Главная</div>
    <div class="tab" data-tab="library">Библиотека</div>
  </div>
  
  <div class="tab-content">
    <div class="tab-pane active" id="main-tab">
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
        <button class="station-btn" data-mood="энергичный">⚡ Энергичный</button>
        <button class="station-btn" data-mood="спокойный">🌊 Спокойный</button>
        <button class="station-btn" data-mood="грустный">😢 Грустный</button>
        <button class="station-btn" data-mood="веселый">🎉 Веселый</button>
        <button class="station-btn" data-mood="меланхоличный">🌙 Меланхоличный</button>
        <button class="station-btn" data-mood="ночной">🌃 Ночной</button>
      </div>
      <input class="search-bar" id="searchInput" placeholder="Поиск песен..." />
      <div id="searchResults"></div>
    </div>
    
    <div class="tab-pane" id="library-tab">
      <div class="sub-tabs">
        <div class="sub-tab active" data-subtab="likes">Понравившееся</div>
        <div class="sub-tab" data-subtab="playlists">Плейлисты</div>
        <div class="sub-tab" data-subtab="history">История</div>
      </div>
      <div id="likes-content"></div>
      <div id="playlists-content" style="display:none;"></div>
      <div id="history-content" style="display:none;"></div>
    </div>
  </div>
  
  <div class="player" id="player">
    <div class="player-info">
      <div>
        <div id="playerTitle" style="font-weight:500;">Название трека</div>
        <div id="playerArtist" style="color:var(--text-secondary);">Артист</div>
      </div>
      <div class="player-controls">
        <button id="shuffleBtn" title="Перемешать">🔀</button>
        <button id="prevBtn" title="Предыдущий">⏮</button>
        <button id="playBtn">▶</button>
        <button id="nextBtn" title="Следующий">⏭</button>
        <button id="repeatBtn" title="Повтор">🔁</button>
        <button id="downloadBtn" title="Скачать">⬇</button>
      </div>
    </div>
    <audio id="audioPlayer" controls></audio>
  </div>
  
  <script>
    const { ipcRenderer } = require('electron');
    const userId = 'user-123';
    let currentTracks = [];
    let currentTrackIndex = 0;
    
    // DOM
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const audioPlayer = document.getElementById('audioPlayer');
    const player = document.getElementById('player');
    const playerTitle = document.getElementById('playerTitle');
    const playerArtist = document.getElementById('playerArtist');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    // ===== ВКЛАДКИ =====
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
      });
    });
    
    document.querySelectorAll('.sub-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const parent = tab.closest('.tab-pane');
        parent.querySelectorAll('.sub-tab-content').forEach(c => c.style.display = 'none');
        document.getElementById(tab.dataset.subtab + '-content').style.display = 'block';
      });
    });
    
    // ===== ПОИСК =====
    let timeout;
    searchInput.addEventListener('input', () => {
      clearTimeout(timeout);
      const q = searchInput.value.trim();
      if (q.length > 2) timeout = setTimeout(() => search(q), 500);
      else searchResults.innerHTML = '';
    });
    
    async function search(query) {
      const tracks = await ipcRenderer.invoke('search', query);
      currentTracks = tracks;
      renderTracks(tracks, searchResults);
    }
    
    // ===== СТАНЦИИ =====
    document.querySelectorAll('.station-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const tracks = await ipcRenderer.invoke('station', btn.dataset.mood);
        currentTracks = tracks;
        renderTracks(tracks, searchResults);
        searchInput.value = `Станция: ${btn.textContent.trim()}`;
      });
    });
    
    // ===== РЕНДЕР ТРЕКОВ =====
    function renderTracks(tracks, container) {
      container.innerHTML = tracks.map((track, idx) => `
        <div class="track-item" data-index="${idx}">
          <img class="track-cover" src="${track.cover}" onerror="this.src='https://via.placeholder.com/50/1e1e1e/fff?text=🎵'" />
          <div class="track-info">
            <div class="track-title">${track.title}</div>
            <div class="track-artist">${track.artist}</div>
          </div>
          <div class="track-actions">
            <button class="like-btn" data-trackid="${track.id}">${track.isLiked ? '❤️' : '🤍'}</button>
          </div>
        </div>
      `).join('');
      
      container.querySelectorAll('.track-item').forEach(item => {
        item.addEventListener('click', (e) => {
          if (e.target.closest('.like-btn')) return;
          const idx = parseInt(item.dataset.index);
          playTrack(idx);
        });
      });
      
      container.querySelectorAll('.like-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const track = currentTracks.find(t => t.id === btn.dataset.trackid);
          if (!track) return;
          if (btn.classList.contains('liked')) {
            await ipcRenderer.invoke('unlike', { userId, trackId: track.id, trackData: track });
            btn.classList.remove('liked');
            btn.textContent = '🤍';
            track.isLiked = false;
          } else {
            await ipcRenderer.invoke('like', { userId, trackId: track.id, trackData: track });
            btn.classList.add('liked');
            btn.textContent = '❤️';
            track.isLiked = true;
          }
        });
      });
    }
    
    // ===== ВОСПРОИЗВЕДЕНИЕ (ОБНОВЛЁННОЕ) =====
    async function playTrack(index) {
      const track = currentTracks[index];
      if (!track) return;
      currentTrackIndex = index;
      
      try {
        console.log(`🎵 Попытка воспроизвести: ${track.title} (${track.source})`);
        const streamUrl = await ipcRenderer.invoke('getStream', {
          url: track.url,
          source: track.source
        });
        
        if (!streamUrl) {
          console.error('❌ Не удалось получить аудио-поток');
          return;
        }
        
        console.log(`✅ Получен поток: ${streamUrl}`);
        audioPlayer.src = streamUrl;
        audioPlayer.play();
        player.classList.add('active');
        playerTitle.textContent = track.title;
        playerArtist.textContent = track.artist;
        playBtn.textContent = '⏸';
        ipcRenderer.invoke('history', { userId, trackData: track });
      } catch (error) {
        console.error('❌ Ошибка воспроизведения:', error);
      }
    }
    
    playBtn.addEventListener('click', () => {
      if (audioPlayer.paused) { audioPlayer.play(); playBtn.textContent = '⏸'; }
      else { audioPlayer.pause(); playBtn.textContent = '▶'; }
    });
    
    // ===== ПРЕДЫДУЩИЙ / СЛЕДУЮЩИЙ =====
    prevBtn.addEventListener('click', () => {
      if (currentTracks.length === 0) return;
      const newIndex = (currentTrackIndex - 1 + currentTracks.length) % currentTracks.length;
      playTrack(newIndex);
    });
    
    nextBtn.addEventListener('click', () => {
      if (currentTracks.length === 0) return;
      const newIndex = (currentTrackIndex + 1) % currentTracks.length;
      playTrack(newIndex);
    });
    
    // ===== ПЕРЕМЕШИВАНИЕ =====
    let shuffleEnabled = false;
    document.getElementById('shuffleBtn').addEventListener('click', () => {
      shuffleEnabled = !shuffleEnabled;
      document.getElementById('shuffleBtn').classList.toggle('active', shuffleEnabled);
      
      if (shuffleEnabled && currentTracks.length > 0) {
        for (let i = currentTracks.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [currentTracks[i], currentTracks[j]] = [currentTracks[j], currentTracks[i]];
        }
        const activeTab = document.querySelector('.tab-pane.active');
        if (activeTab) {
          const container = activeTab.querySelector('#searchResults') || 
                            activeTab.querySelector('#likes-content') ||
                            activeTab.querySelector('#history-content');
          if (container) renderTracks(currentTracks, container);
        }
      }
    });
    
    // ===== ПОВТОР =====
    let repeatMode = 0;
    document.getElementById('repeatBtn').addEventListener('click', () => {
      repeatMode = (repeatMode + 1) % 3;
      const modes = ['🔁', '🔂', '🔁🔁'];
      document.getElementById('repeatBtn').textContent = modes[repeatMode];
      document.getElementById('repeatBtn').style.color = ['white', '#bb86fc', '#ff4080'][repeatMode];
    });
    
    audioPlayer.addEventListener('ended', () => {
      if (repeatMode === 1) {
        audioPlayer.currentTime = 0;
        audioPlayer.play();
      } else if (repeatMode === 2) {
        const nextIndex = (currentTrackIndex + 1) % currentTracks.length;
        if (nextIndex < currentTracks.length) playTrack(nextIndex);
      } else {
        playBtn.textContent = '▶';
      }
    });
    
    // ===== СКАЧИВАНИЕ =====
    document.getElementById('downloadBtn').addEventListener('click', () => {
      if (!audioPlayer.src) return;
      const link = document.createElement('a');
      link.href = audioPlayer.src;
      link.download = `${playerTitle.textContent} - ${playerArtist.textContent}.mp3`;
      link.click();
    });
    
    // ===== ЗАГРУЗКА БИБЛИОТЕКИ =====
    async function loadLibrary() {
      const data = await ipcRenderer.invoke('library', userId);
      renderTracks(data.likes || [], document.getElementById('likes-content'));
      renderTracks(data.history || [], document.getElementById('history-content'));
      const playlistsContainer = document.getElementById('playlists-content');
      playlistsContainer.innerHTML = (data.playlists || []).map(p => `
        <div style="background:var(--surface);padding:16px;border-radius:8px;margin-bottom:8px;">
          <div style="font-weight:500;">📁 ${p.name}</div>
          <div style="color:var(--text-secondary);">${(p.tracks || []).length} треков</div>
        </div>
      `).join('');
    }
    
    loadLibrary();
  </script>
</body>
</html>
